<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f0ea;font-family:'Cormorant Garamond',serif;color:#5a4a3a;min-height:100vh;display:flex;align-items:center;justify-content:center;}

.page{background:#fff;max-width:540px;width:100%;margin:30px auto;position:relative;border:1px solid #e0d5c5;padding:50px 40px;text-align:center;}

.corner{position:absolute;width:36px;height:36px;}
.corner.tl{top:12px;left:12px;border-top:2px solid #b8a07a;border-left:2px solid #b8a07a;}
.corner.tr{top:12px;right:12px;border-top:2px solid #b8a07a;border-right:2px solid #b8a07a;}
.corner.bl{bottom:12px;left:12px;border-bottom:2px solid #b8a07a;border-left:2px solid #b8a07a;}
.corner.br{bottom:12px;right:12px;border-bottom:2px solid #b8a07a;border-right:2px solid #b8a07a;}
.inner-border{position:absolute;inset:12px;border:1px solid #c8b89a;pointer-events:none;}

.bh{font-size:13px;color:#9a8060;letter-spacing:2px;font-style:italic;text-align:right;margin-bottom:30px;}

.ring{width:80px;height:80px;margin:0 auto 24px;}
.ring svg{width:100%;height:100%;}

.pre{font-size:13px;color:#9a8060;letter-spacing:4px;font-style:italic;margin-bottom:10px;}

.names{font-family:'Great Vibes',cursive;font-size:78px;color:#7a5c2e;line-height:.95;}
.amp{display:block;font-size:56px;color:#b8a07a;margin:2px 0;}

.orn{display:flex;align-items:center;gap:12px;margin:22px auto;max-width:260px;}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,#c8b08a,transparent);}
.orn span{color:#b8a07a;font-size:15px;}

.cd{display:flex;gap:14px;justify-content:center;margin-bottom:40px;}
.block{text-align:center;}
.block-inner{border:1px solid #d5c5a8;background:#faf8f4;padding:12px 16px;min-width:64px;margin-bottom:6px;}
.num{font-family:'Great Vibes',cursive;font-size:46px;color:#7a5c2e;line-height:1;display:block;}
.lbl{font-size:11px;letter-spacing:3px;color:#9a8060;text-transform:uppercase;}

.btn{display:inline-block;padding:13px 38px;background:#9a7a45;color:#fff;font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;letter-spacing:2px;cursor:pointer;border:none;text-decoration:none;transition:background .25s;}
.btn:hover{background:#7a5c2e;}

.bouquet{margin:0 auto 18px;display:block;}
</style>

<div class="page">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="inner-border"></div>

  <div class="bh">ב״ה</div>

  <div class="ring">
    <svg viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="40" r="37" stroke="#c8b08a" stroke-width="0.8"/>
      <circle cx="40" cy="40" r="33" stroke="#e0d0b0" stroke-width="0.5" stroke-dasharray="3,5"/>
      <text x="40" y="47" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#9a7a45" font-style="italic">Y &amp; E</text>
    </svg>
  </div>

  <svg class="bouquet" width="48" height="52" viewBox="0 0 50 55">
    <ellipse cx="25" cy="43" rx="11" ry="5" fill="#d4c5a5" opacity="0.5"/>
    <line x1="25" y1="37" x2="25" y2="50" stroke="#9a8060" stroke-width="1.5"/>
    <line x1="20" y1="41" x2="25" y2="37" stroke="#9a8060" stroke-width="1"/>
    <line x1="30" y1="41" x2="25" y2="37" stroke="#9a8060" stroke-width="1"/>
    <circle cx="25" cy="19" r="8" fill="#e8d5b5" stroke="#c8a870" stroke-width="0.5"/>
    <circle cx="16" cy="23" r="6" fill="#e0c8a0" stroke="#c8a870" stroke-width="0.5"/>
    <circle cx="34" cy="23" r="6" fill="#e0c8a0" stroke="#c8a870" stroke-width="0.5"/>
    <circle cx="20" cy="13" r="5" fill="#d8bfa0" stroke="#c8a870" stroke-width="0.5"/>
    <circle cx="30" cy="13" r="5" fill="#d8bfa0" stroke="#c8a870" stroke-width="0.5"/>
    <circle cx="25" cy="8" r="4" fill="#c8a870" stroke="#a88850" stroke-width="0.5"/>
  </svg>

  <p class="pre">Mariage de</p>

  <div class="names">
    Yael
    <span class="amp">&</span>
    Elias
  </div>

  <div class="orn"><span>✦</span></div>

  <div class="cd">
    <div class="block"><div class="block-inner"><span class="num" id="cd-j">—</span></div><span class="lbl">Jours</span></div>
    <div class="block"><div class="block-inner"><span class="num" id="cd-h">—</span></div><span class="lbl">Heures</span></div>
    <div class="block"><div class="block-inner"><span class="num" id="cd-m">—</span></div><span class="lbl">Minutes</span></div>
    <div class="block"><div class="block-inner"><span class="num" id="cd-s">—</span></div><span class="lbl">Secondes</span></div>
  </div>

  <a class="btn" href="#" onclick="sendPrompt('Montrez-moi l\'invitation complète de Yael et Elias'); return false;">Voir l'invitation</a>
</div>

<script>
const TARGET=new Date('2026-08-26T14:00:00');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const d=TARGET-new Date();
  if(d<=0){['cd-j','cd-h','cd-m','cd-s'].forEach(id=>document.getElementById(id).textContent='00');return;}
  document.getElementById('cd-j').textContent=Math.floor(d/864e5);
  document.getElementById('cd-h').textContent=pad(Math.floor(d%864e5/36e5));
  document.getElementById('cd-m').textContent=pad(Math.floor(d%36e5/6e4));
  document.getElementById('cd-s').textContent=pad(Math.floor(d%6e4/1e3));
}
tick();setInterval(tick,1000);
</script>

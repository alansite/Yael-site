<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;font-family:'Cormorant Garamond',serif;color:#5a4520;min-height:100vh;display:flex;align-items:center;justify-content:center;}

.page{background:#fff;max-width:480px;width:100%;margin:20px auto;position:relative;text-align:center;padding:0 20px 50px;}

.wreath-wrap{position:relative;width:100%;display:flex;align-items:center;justify-content:center;}
.wreath-wrap svg{width:100%;height:auto;display:block;}

.inner-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52%;display:flex;flex-direction:column;align-items:center;justify-content:center;}

.monogram{font-family:'Great Vibes',cursive;font-size:36px;color:#b8922a;line-height:1;margin-bottom:4px;}
.names{font-family:'Great Vibes',cursive;font-size:46px;color:#8a6418;line-height:1.05;}
.amp{color:#c8a030;}

.orn{display:flex;align-items:center;gap:8px;margin:8px auto;width:90%;}
.orn::before,.orn::after{content:'';flex:1;height:0.5px;background:#c8a030;opacity:0.6;}
.orn span{color:#c8a030;font-size:12px;}

.cd{display:flex;gap:10px;justify-content:center;margin:10px 0 0;}
.block{text-align:center;}
.num{font-family:'Cormorant Garamond',serif;font-size:28px;color:#8a6418;font-weight:400;line-height:1;display:block;}
.lbl{font-size:9px;letter-spacing:2.5px;color:#b8922a;text-transform:uppercase;display:block;margin-top:1px;}

.btn-wrap{margin-top:16px;}
.btn{display:inline-block;padding:10px 28px;background:#b8922a;color:#fff;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;letter-spacing:2px;cursor:pointer;border:none;text-decoration:none;transition:background .25s;}
.btn:hover{background:#8a6418;}

.bh{font-size:11px;color:#c8a868;letter-spacing:2px;font-style:italic;margin-bottom:2px;}
</style>

<script>
const TARGET=new Date('2026-08-26T14:00:00');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const d=TARGET-new Date();
  if(d<=0){['cd-j','cd-h','cd-m','cd-s'].forEach(id=>document.getElementById(id).textContent='00');return;}
  document.getElementById('cd-j').textContent=Math.floor(d/864e5);
  document.getElementById('cd-h').textContent=pad(Math.floor(d%864e5/36e5));
  document.getElementById('cd-m').textContent=pad(Math.floor(d%36e5/6e4));
  document.getElementById('cd-s').textContent=pad(Math.floor(d%6e4/1e3));
}
tick();setInterval(tick,1000);
</script>
